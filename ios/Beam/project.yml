name: Beam
options:
  deploymentTarget:
    iOS: "16.0"
  bundleIdPrefix: com.fangduo
  developmentLanguage: zh-Hans
  xcodeVersion: "16"
  groupSortPosition: none
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    DEVELOPMENT_TEAM: R7UJ6NVP79
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "7"

targets:
  Beam:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Beam
        excludes:
          - "*.entitlements"
    info:
      path: Beam/Info.plist
      properties:
        CFBundleDisplayName: Beam
        CFBundleIconName: AppIcon
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSPhotoLibraryUsageDescription: "Beam 需要访问相册以发送图片到其他设备"
        UIBackgroundModes:
          - remote-notification
          - fetch
        ITSAppUsesNonExemptEncryption: false
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    entitlements:
      path: Beam/Beam.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fangduo.beam
        INFOPLIST_FILE: Beam/Info.plist
        CODE_SIGN_ENTITLEMENTS: Beam/Beam.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: BeamShare
        embed: true

  BeamShare:
    type: app-extension
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: BeamShare
    info:
      path: BeamShare/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleDisplayName: Beam Share
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsText: true
              NSExtensionActivationSupportsFileWithMaxCount: 1
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fangduo.beam.BeamShare
        INFOPLIST_FILE: BeamShare/Info.plist
        APPLICATION_EXTENSION_API_ONLY: YES
